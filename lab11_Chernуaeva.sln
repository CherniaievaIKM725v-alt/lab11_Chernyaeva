#include <iostream>
using namespace std;

int main() {
    int n, m;
    cout << "Enter size of x: ";
    cin >> n;
    cout << "Enter size of y: ";
    cin >> m;

    int* x = new int[n];
    int* y = new int[m];

    cout << "Enter x: ";
    for (int i = 0; i < n; i++)
        cin >> x[i];

    cout << "Enter y: ";
    for (int i = 0; i < m; i++)
        cin >> y[i];

    int last = x[n - 1];
    int count = 0;

    for (int i = 0; i < m; i++)
        if (y[i] == last)
            count++;

    cout << "Last element of x: " << last << endl;
    cout << "Count in y: " << count << endl;

    delete[] x;
    delete[] y;

    return 0;
}
